name: Deploy to GitHub Pages

on:
  workflow_dispatch

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm run test:unit -- --run

      - name: Build
        run: npm run build

      - name: Deploy to gh-pages
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git fetch origin gh-pages 2>/dev/null || true
          git checkout -b gh-pages origin/gh-pages 2>/dev/null || git checkout --orphan gh-pages
          rm -rf .
          cp -r dist/* .
          echo "essence.khattak.cc" > CNAME
          git add -A
          git commit -m "Deploy: ${{ github.sha }} at $(date -u +'%Y-%m-%dT%H:%M:%SZ')" || echo "No changes to commit"
          git push -u origin gh-pages

      - name: Set deployment URL
        run: echo "Deployed to https://essence.khattak.cc"
